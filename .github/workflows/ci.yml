name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test]

      - name: Compile backend modules
        run: python -m compileall TKBEN/server

      - name: Ruff checks
        run: python -m ruff check TKBEN/server tests

      - name: Unit tests
        run: python -m pytest tests/unit -q

      - name: OpenAPI smoke
        run: python -c "from TKBEN.server.app import app; app.openapi()"
