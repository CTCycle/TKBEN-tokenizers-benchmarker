name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install test dependencies
        working-directory: app/server
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test]

      - name: Compile backend modules
        working-directory: app/server
        run: python -m compileall app.py api common configurations domain repositories services

      - name: Ruff checks
        run: python -m ruff check app/server app/tests

      - name: Unit tests
        run: python -m pytest app/tests/unit -q

      - name: OpenAPI smoke
        run: python -c "from server.app import app; app.openapi()"
