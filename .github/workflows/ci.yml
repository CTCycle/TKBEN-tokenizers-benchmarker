name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install test dependencies
        working-directory: app/server
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test]

      - name: Compile backend modules
        working-directory: app/server
        run: python -m compileall app.py api common configurations domain repositories services

      - name: Ruff checks
        run: python -m ruff check app/server app/tests

      - name: Unit tests
        run: python -m pytest app/tests/unit -q

      - name: OpenAPI smoke
        run: python -c "from server.app import app; app.openapi()"

  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/client/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/client
        run: npm ci

      - name: Lint frontend
        working-directory: app/client
        run: npm run lint

      - name: Build frontend
        working-directory: app/client
        run: npm run build
